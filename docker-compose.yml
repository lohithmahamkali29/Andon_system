version: '3.8'

services:
  # MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: andon-mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    restart: unless-stopped
    networks:
      - andon-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: andon-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - MQTT_BROKER_URL=mqtt://mosquitto:1883
      - DATABASE_PATH=/app/database/andon.db
      - CORS_ORIGIN=http://localhost:3000
    volumes:
      - ./backend/database:/app/database
      - ./backend/logs:/app/logs
    depends_on:
      - mosquitto
    restart: unless-stopped
    networks:
      - andon-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dashboard
  frontend:
    build:
      context: ./frontend/andon-dashboard
      dockerfile: Dockerfile
    container_name: andon-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - andon-network

networks:
  andon-network:
    driver: bridge

volumes:
  mosquitto-data:
  mosquitto-log:
  backend-database:
  backend-logs: